version: "3.1"

intents:
  - greet
  - demander_faq
  - nlu_fallback

responses:
  utter_greet:
    - text: "Bonjour ! Comment puis-je vous aider aujourd'hui ?"

  utter_faq_deterministic:
    - text: |
        Merci pour votre question.
        ✅ Route A activée : je réponds en mode déterministe Rasa.
        Pour la V1, cette réponse est un placeholder contrôlé.

  utter_qdrant_simulated:
    - text: |
        ✅ Route B activée : interrogation Qdrant simulée (préparation Semaine 2).
        Merci de reformuler avec plus de détails si besoin.

  utter_default:
    - text: |
        Désolé, je ne suis pas certain d'avoir bien compris votre demande.
        Pouvez-vous reformuler votre question ?

        ✅ Exemples de questions que vous pouvez poser :
        - "Quels documents faut-il pour une inscription ?"
        - "Comment contacter le support ?"
        - "Quelles sont les étapes de la procédure ?"

actions:
  - action_hybrid_router
